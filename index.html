<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>計算機</title>
</head>
<body>
    <p id="display">0</p>
    <button>7</button>
    <button>8</button>
    <button>9</button>
    <button>÷</button>
    <br>
    <button>4</button>
    <button>5</button>
    <button>6</button>
    <button>×</button>
    <br>
    <button>1</button>
    <button>2</button>
    <button>3</button>
    <button>-</button>
    <br>
    <button>0</button>
    <button>+</button>

    <script>
        let display = document.getElementById('display');

        function pressNumber(n) {
            if (display.textContent === '0') {
                display.textContent = n;
            } else {
                display.textContent = display.textContent + n;
            }
        }
    </script>
</body>
</html>
